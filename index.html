<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#5b6af0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="姣忔棩鐪嬫澘" />
  <meta name="description" content="涓撲负鎵嬫満璁捐鐨勪换鍔＄鐞嗗簲鐢紝鐩磋鏌ョ湅姣忓ぉ闇€瑕佸仛浠€涔堬紝杞绘澗璁板綍瀹屾垚鐨勪簨椤癸紝杩愬姩鎵撳崱鍩瑰吇鍋ュ悍涔犳儻" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%235b6af0'/><stop offset='100%25' style='stop-color:%238b5cf6'/></linearGradient></defs><rect width='192' height='192' rx='40' fill='url(%23g)'/><rect x='36' y='50' width='120' height='18' rx='6' fill='white' opacity='0.9'/><rect x='36' y='82' width='100' height='18' rx='6' fill='white' opacity='0.7'/><rect x='36' y='114' width='80' height='18' rx='6' fill='white' opacity='0.5'/><circle cx='160' cy='59' r='8' fill='%2334c759'/></svg>" />
  <title>鎴戠殑姣忔棩鐪嬫澘</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #f5f5f7; --card: #ffffff; --primary: #5b6af0; --primary-light: #eef0ff;
      --success: #34c759; --success-light: #eafaf0; --danger: #ff3b30;
      --text: #1c1c1e; --sub: #8e8e93; --border: #e5e5ea; --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    html, body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; overscroll-behavior: none; -webkit-overflow-scrolling: touch; }
    body { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .header { background: linear-gradient(135deg, #5b6af0 0%, #8b5cf6 100%); color: white; padding: max(20px, env(safe-area-inset-top)) 20px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(91,106,240,0.3); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .date { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .header .greeting { font-size: 14px; opacity: 0.9; margin-top: 2px; }
    .progress-wrap { margin-top: 14px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; opacity: 0.9; margin-bottom: 6px; }
    .progress-bar { background: rgba(255,255,255,0.25); border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-fill { background: white; border-radius: 99px; height: 100%; transition: width 0.4s ease; }
    .sport-card { margin: 16px 16px 0; background: var(--card); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; border: 2px solid transparent; }
    .sport-card:active { transform: scale(0.98); }
    .sport-card.done { border-color: var(--success); background: var(--success-light); }
    .sport-icon { font-size: 32px; flex-shrink: 0; }
    .sport-info { flex: 1; }
    .sport-title { font-size: 16px; font-weight: 600; }
    .sport-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .sport-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.2s; }
    .sport-card.done .sport-check { background: var(--success); border-color: var(--success); color: white; }
    .section { margin: 16px 16px 0; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .section-title { font-size: 15px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; }
    .section-count { font-size: 13px; color: var(--sub); }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item { background: var(--card); border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; transition: all 0.2s; border-left: 4px solid transparent; }
    .task-item.priority-high { border-left-color: #ff3b30; }
    .task-item.priority-medium { border-left-color: #ff9500; }
    .task-item.priority-low { border-left-color: #34c759; }
    .task-item.done-item { opacity: 0.5; }
    .task-item.done-item .task-text { text-decoration: line-through; }
    .task-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; font-size: 13px; }
    .task-check.checked { background: var(--success); border-color: var(--success); color: white; }
    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 15px; line-height: 1.4; word-break: break-all; }
    .task-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .tag-high { background: #fff0ef; color: #ff3b30; }
    .tag-medium { background: #fff8ee; color: #ff9500; }
    .tag-low { background: #eafaf0; color: #34c759; }
    .task-time { font-size: 11px; color: var(--sub); }
    .task-del { width: 28px; height: 28px; border-radius: 50%; background: #fff0ef; color: var(--danger); border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .task-del:active { transform: scale(0.9); }
    .add-section { margin: 16px 16px 0; }
    .add-box { background: var(--card); border-radius: 16px; padding: 16px; box-shadow: var(--shadow); }
    .add-box textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 16px; resize: none; outline: none; font-family: inherit; color: var(--text); background: var(--bg); transition: border-color 0.2s; min-height: 60px; }
    .add-box textarea:focus { border-color: var(--primary); }
    .add-controls { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .priority-select { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 16px; outline: none; background: var(--bg); color: var(--text); font-family: inherit; }
    .add-btn { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 10px 24px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .add-btn:active { transform: scale(0.96); background: #4a59e0; }
    .empty { text-align: center; padding: 30px 0; color: var(--sub); font-size: 14px; }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }
    .clear-btn { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 13px; color: var(--sub); cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .clear-btn:active { background: var(--bg); }
    .install-prompt { position: fixed; bottom: 20px; left: 16px; right: 16px; background: var(--card); border-radius: 16px; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: none; align-items: center; gap: 12px; z-index: 999; }
    .install-prompt.show { display: flex; }
    .install-icon { font-size: 32px; }
    .install-text { flex: 1; font-size: 14px; }
    .install-text b { display: block; font-size: 16px; margin-bottom: 2px; }
    .install-btn { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .install-close { background: none; border: none; font-size: 18px; color: var(--sub); cursor: pointer; padding: 4px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1c1c1e; color: white; padding: 10px 20px; border-radius: 99px; font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <h1>鎴戠殑姣忔棩鐪嬫澘</h1>
      <div class="date" id="dateStr"></div>
      <div class="greeting" id="greetingStr"></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>浠婃棩杩涘害</span>
      <span id="progressText">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</div>
<div class="sport-card" id="sportCard" onclick="toggleSport()">
  <div class="sport-icon">馃弮</div>
  <div class="sport-info">
    <div class="sport-title">姣忔棩杩愬姩 30 鍒嗛挓</div>
    <div class="sport-sub" id="sportSub">鐐瑰嚮鎵撳崱锛屼粖澶╄繕娌¤繍鍔ㄥ摝</div>
  </div>
  <div class="sport-check" id="sportCheck">鈼?/div>
</div>
<div class="section">
  <div class="section-header">
    <span class="section-title">馃搶 寰呭姙浜嬮」</span>
    <span class="section-count" id="pendingCount"></span>
  </div>
  <div class="task-list" id="pendingList"></div>
</div>
<div class="section" id="doneSection" style="display:none">
  <div class="section-header">
    <span class="section-title">鉁?浠婃棩宸插畬鎴?/span>
    <button class="clear-btn" onclick="clearDone()">娓呴櫎宸插畬鎴?/button>
  </div>
  <div class="task-list" id="doneList"></div>
</div>
<div class="add-section">
  <div class="add-box">
    <textarea id="taskInput" placeholder="娣诲姞鏂颁换鍔?.." rows="2"></textarea>
    <div class="add-controls">
      <select class="priority-select" id="prioritySelect">
        <option value="high">馃敶 楂樹紭鍏堢骇</option>
        <option value="medium" selected>馃煛 涓紭鍏堢骇</option>
        <option value="low">馃煝 浣庝紭鍏堢骇</option>
      </select>
      <button class="add-btn" onclick="addTask()">娣诲姞</button>
    </div>
  </div>
</div>
<div class="install-prompt" id="installPrompt">
  <div class="install-icon">馃摬</div>
  <div class="install-text">
    <b>娣诲姞鍒颁富灞忓箷</b>
    鍍廇pp涓€鏍蜂娇鐢紝绂荤嚎涔熻兘鐢?  </div>
  <button class="install-btn" id="installBtn">娣诲姞</button>
  <button class="install-close" onclick="closeInstall()">脳</button>
</div>
<div class="toast" id="toast"></div>
<script>
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js');}
const STORAGE_KEY='daily_board_v2';const SPORT_KEY='sport_checkin';
function getToday(){return new Date().toISOString().slice(0,10);}
function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{tasks:[]};}catch{return{tasks:[]};}}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function getSportState(){try{const s=JSON.parse(localStorage.getItem(SPORT_KEY))||{};return s.date===getToday()?s.done:false;}catch{return false;}}
function setSportState(d){localStorage.setItem(SPORT_KEY,JSON.stringify({date:getToday(),done:d}));}
function initHeader(){const n=new Date(),d=['鏃?,'涓€','浜?,'涓?,'鍥?,'浜?,'鍏?];document.getElementById('dateStr').textContent=${n.getFullYear()}骞?{n.getMonth()+1}鏈?{n.getDate()}鏃?路 鏄熸湡;const h=n.getHours();document.getElementById('greetingStr').textContent=h<6?'馃寵 澶滄繁浜嗭紝娉ㄦ剰浼戞伅':h<12?'鈽€锔?鏃╀笂濂斤紝浠婂ぉ涔熻鍔犳补锛?:h<14?'馃尋 涓崍濂斤紝璁板緱鍚冮キ':h<18?'馃尀 涓嬪崍濂斤紝缁х画鍐诧紒':'馃寙 鏅氫笂濂斤紝浠婂ぉ杈涜嫤浜?;}
function toggleSport(){const d=!getSportState();setSportState(d);renderSport();updateProgress();showToast(d?'馃帀 杩愬姩鎵撳崱鎴愬姛锛?:'宸插彇娑堣繍鍔ㄦ墦鍗?);}
function renderSport(){const d=getSportState(),c=document.getElementById('sportCard'),ch=document.getElementById('sportCheck'),s=document.getElementById('sportSub');if(d){c.classList.add('done');ch.textContent='鉁?;s.textContent='浠婂ぉ宸插畬鎴愯繍鍔ㄦ墦鍗?馃帀';}else{c.classList.remove('done');ch.textContent='鈼?;s.textContent='鐐瑰嚮鎵撳崱锛屼粖澶╄繕娌¤繍鍔ㄥ摝';}}
function render(){const data=loadData(),today=getToday(),tasks=data.tasks.filter(t=>!t.date||t.date===today),pending=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done),pl=document.getElementById('pendingList');document.getElementById('pendingCount').textContent=${pending.length} 椤筦;pl.innerHTML=pending.length?pending.map(t=>taskHTML(t,false)).join(''):'<div class="empty"><div class="empty-icon">馃幆</div>鏆傛棤寰呭姙锛屾坊鍔犱竴涓惂</div>';const dl=document.getElementById('doneList'),ds=document.getElementById('doneSection');if(done.length){ds.style.display='';dl.innerHTML=done.map(t=>taskHTML(t,true)).join('');}else{ds.style.display='none';}updateProgress();}
function taskHTML(t,isDone){const tm={high:'楂樹紭鍏?,medium:'涓紭鍏?,low:'浣庝紭鍏?},tc={high:'tag-high',medium:'tag-medium',low:'tag-low'};return<div class="task-item priority- "><div class="task-check " onclick="toggleTask('')"></div><div class="task-body"><div class="task-text"></div><div class="task-meta"><span class="tag "></span><span class="task-time"></span></div></div><button class="task-del" onclick="deleteTask('')">脳</button></div>;}
function updateProgress(){const data=loadData(),today=getToday(),tasks=data.tasks.filter(t=>!t.date||t.date===today),sportDone=getSportState()?1:0,total=tasks.length+1,done=tasks.filter(t=>t.done).length+sportDone,pct=total?Math.round(done/total*100):0;document.getElementById('progressText').textContent=${done} / ;document.getElementById('progressFill').style.width=pct+'%';}
function addTask(){const input=document.getElementById('taskInput'),text=input.value.trim();if(!text){showToast('璇疯緭鍏ヤ换鍔″唴瀹?);return;}const data=loadData(),now=new Date();data.tasks.push({id:Date.now().toString(),text,priority:document.getElementById('prioritySelect').value,done:false,date:getToday(),time:${String(now.getHours()).padStart(2,'0')}:});saveData(data);input.value='';render();showToast('鉁?浠诲姟宸叉坊鍔?);}
function toggleTask(id){const data=loadData(),t=data.tasks.find(t=>t.id===id);if(t){t.done=!t.done;saveData(data);render();}}
function deleteTask(id){const data=loadData();data.tasks=data.tasks.filter(t=>t.id!==id);saveData(data);render();showToast('宸插垹闄?);}
function clearDone(){const data=loadData(),today=getToday();data.tasks=data.tasks.filter(t=>!(t.done&&(!t.date||t.date===today)));saveData(data);render();showToast('宸叉竻闄や粖鏃ュ畬鎴愰」');}
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function initDefaultTasks(){const data=loadData();if(!data.tasks.length){const today=getToday();[{text:'鍏氭敮閮ㄥ伐浣滐細妫€鏌ヨ繎鏈熷緟鍔炰簨椤?,priority:'high'},{text:'23绾ф瘯涓氱彮锛氳窡杩涙瘯涓氳繘搴?,priority:'high'},{text:'鑻楁棌渚楁棌鏂囧垱锛氭暣鐞嗚皟鐮旇祫鏂?,priority:'medium'},{text:'浜墽闄剁摲AI鐭墽锛氬涔犲伐鍏?,priority:'medium'},{text:'瀛︿範AI鍒朵綔鐭墽/婕墽锛?0鍒嗛挓锛?,priority:'low'}].forEach((d,i)=>{data.tasks.push({id:(Date.now()+i).toString(),text:d.text,priority:d.priority,done:false,date:today,time:''});});saveData(data);}}
let deferredPrompt;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installPrompt').classList.add('show');});
document.getElementById('installBtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;closeInstall();});
function closeInstall(){document.getElementById('installPrompt').classList.remove('show');}
function isIos(){return/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());}
function isInStandaloneMode(){return'standalone'in window.navigator&&window.navigator.standalone;}
if(isIos()&&!isInStandaloneMode()){setTimeout(()=>{const p=document.getElementById('installPrompt');document.getElementById('installBtn').textContent='鐭ラ亾浜?;document.getElementById('installBtn').onclick=closeInstall;document.querySelector('.install-text').innerHTML='<b>娣诲姞鍒颁富灞忓箷</b>鐐瑰簳閮?鈻?鈫?鐒跺悗"娣诲姞鍒颁富灞忓箷"';p.classList.add('show');},2000);}
initDefaultTasks();initHeader();renderSport();render();setInterval(initHeader,60000);
</script>
</body>
</html>
